description: >-
  Unified code quality tool that enables AI agents to generate code safely
  by automatically checking, reporting, and helping fix quality issues.
  Consolidates linting, type checking, formatting, security scanning (SAST/SCA/IaC),
  testing, coverage analysis, and duplication detection into one tool.
  Local-first with MCP support for Claude Code. Supports 15 languages.
