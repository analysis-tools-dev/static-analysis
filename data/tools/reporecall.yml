description: >-
  AST-based code indexing tool using Tree-sitter parsing across 22 languages.
  Extracts call graphs and import graphs from static AST analysis, with hybrid
  keyword (FTS5 with stemming) and vector search. Designed as codebase memory
  for AI coding agents via MCP server interface.
